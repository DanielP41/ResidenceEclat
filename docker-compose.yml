version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: residencia-eclat-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: residencia
      POSTGRES_PASSWORD: residencia_dev_2026
      POSTGRES_DB: residencia_eclat
    ports:
      - '5434:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
